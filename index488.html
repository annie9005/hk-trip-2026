<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎨 2026 香港研討會之旅</title>
    
    <!-- 載入 Tailwind CSS & React 核心 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Quicksand:wght@500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --diary-bg: #F9F7F2;
            --diary-pink: #FFB7C5;
            --diary-blue: #AEC6CF;
            --diary-navy: #3D405B;
            --diary-yellow: #F4F1DE;
            --diary-orange: #E07A5F;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: var(--diary-bg);
            color: var(--diary-navy);
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 手帳感卡片 */
        .diary-card {
            background: white;
            border: 2.5px solid var(--diary-navy);
            border-radius: 1.5rem;
            box-shadow: 4px 4px 0px var(--diary-navy);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 標籤設計 */
        .day-tag {
            background: var(--diary-orange);
            color: white;
            padding: 4px 16px;
            border-radius: 999px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            border: 2px solid var(--diary-navy);
        }

        .diamond-bullet::before {
            content: "✧";
            color: var(--diary-pink);
            font-weight: 900;
            margin-right: 8px;
        }

        .time-line-connector {
            width: 3px;
            height: 15px;
            background: var(--diary-navy);
            margin-left: 2.5rem;
            opacity: 0.2;
        }

        .teacher-must-tag {
            background: #E8294A;
            color: white;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-left: 5px;
        }
        
        @keyframes pop {
            0% { transform: scale(0.98); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const SafeIcon = ({ name, size = 20, className = "", strokeWidth = 2.5 }) => {
            const LucideLib = window.lucideReact || window.Lucide || {};
            const IconComponent = LucideLib[name] || LucideLib[name.charAt(0).toUpperCase() + name.slice(1)];
            if (!IconComponent) return null;
            return <IconComponent size={size} className={className} strokeWidth={strokeWidth} />;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('itinerary');
            const [activeDay, setActiveDay] = useState(0);
            const [role, setRole] = useState('student');
            const [hkd, setHkd] = useState('');
            const [twd, setTwd] = useState('');

                {

                        { id: "1-3", time: "13:30", title: "帝都酒店 (Royal Park Hotel) — 寄放行李", desc: "先將行李寄放在飯店櫃台，輕裝出發去逛逛", map: "沙田帝都酒店", teacher: "老師與師母辦理行李寄放。" },

                        { id: "2-3", time: "08:30 – 09:30", title: "前往 EdUHK 研討會", desc: "沙田站 ➡️ 東鐵綫 ➡️ 大埔墟站 ➡️ 74K 巴士 ➡️ 校園", map: "香港教育大學", teacher: "搭乘專車前往會場。" },

                    events: [
                        { id: "3-1", time: "09:15", title: "🏨 大廳集合", desc: "全體在飯店大廳集合，準備出發享用早餐", map: "沙田帝都酒店", teacher: "準時在大廳集合。" },
                        { id: "3-2", time: "09:30 – 10:30", title: "早餐 — 牛奶冰室（沙田）", desc: "就在沙田站附近，享用完後直接搭地鐵前往 EdUHK", map: "牛奶冰室 沙田", teacher: "與師生同行早餐。" },
                        { id: "3-3", time: "10:30 – 11:30", title: "前往 ICLT 研討會 (EdUHK)", desc: "交通流程：東鐵綫至大埔墟站轉乘 74K 巴士", map: "香港教育大學", teacher: "前往研討會。" },
                        { id: "3-4", time: "11:30 – 12:00", title: "🏗️ 場勘與準備", desc: "確認投影設備與簡報存檔", map: "香港教育大學", teacher: "預備報告指導。" },
                        { id: "3-5", time: "12:00 – 13:00", title: "🎤 研討會發表 — 碩一發表", desc: "碩一正式發表時段。加油加油！💪", tip: "重要發表時段", map: "香港教育大學", teacher: "指導發表並評審。" },
                        { id: "3-6", time: "12:45 – 14:00", title: "🍱 午餐 — 校園內", desc: "EdUHK 校內餐廳用餐，環境舒適", map: "香港教育大學", teacher: "師生同行午餐。" },
                        { id: "3-7", time: "14:00 – 17:00", title: "下午放鬆行程", desc: "選 1: 校園散步 / 選 2: 大埔墟老街 / 選 3: 返回沙田補貨", map: "大埔墟", teacher: "下午自由活動或與師母個人行程。" },

                        { id: "4-2", time: "08:00 – 09:00", title: "最後一頓早餐", desc: "新城市廣場附近茶餐廳，回顧回憶", map: "新城市廣場", teacher: "老師同行 (師母同行)。" },

                    ]
                }
            ];

                    { time: "12:05", label: "抵達香港", must: true },
                    { time: "13:30", label: "飯店行李寄放 (Royal Park)", must: true },

                                                {e.trans && <div className="flex items-center gap-2 text-[10px] font-bold text-blue-500 bg-blue-50/50 p-2 rounded-lg">🚌 {e.trans}</div>}
                                                
                                                <div className="flex gap-2 pt-2">
                                                    <a href={`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(e.map)}`} target="_blank" className="flex-1 flex items-center justify-center gap-2 py-3 bg-[var(--diary-navy)] text-white rounded-xl text-xs font-black shadow-[3px_3px_0px_var(--diary-blue)] active:translate-y-0.5">
                                                        <SafeIcon name="MapPin" size={14} /> 開始導航
                                                    </a>
                                                </div>
                                            </div>
                                        </div>
                                        {idx < itinerary[activeDay].events.length - 1 && <div className="time-line-connector"></div>}
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'pudding' && (
                            <div className="animate-pop space-y-6 pb-10">
                                <div className="diary-card p-6 bg-yellow-50">
                                    <h3 className="font-black text-xl mb-4 flex items-center gap-2"><SafeIcon name="Coffee" className="text-orange-500" /> 兩大必吃蛋塔攻略</h3>
                                    <div className="space-y-6">
                                        <div className="p-4 bg-white rounded-2xl border-2 border-[var(--diary-navy)] shadow-[3px_3px_0px_var(--diary-navy)]">
                                            <p className="font-black text-[#8D6E63] text-lg mb-2">🥐 Bakehouse</p>
                                            <p className="text-xs font-bold leading-relaxed text-slate-600">
                                                📍 <strong>沙田店：</strong> 新城市廣場 3 期 1 樓 153-155 號舖<br/>
                                                ⏰ <strong>營業時間：</strong> 08:00 – 21:00<br/>
                                                ⭐ <strong>優點：</strong> 就在飯店樓下，隨時可買，不用跑遠！
                                            </p>
                                        </div>
                                        <div className="p-4 bg-white rounded-2xl border-2 border-[var(--diary-navy)] shadow-[3px_3px_0px_var(--diary-navy)]">
                                            <p className="font-black text-[#F5A623] text-lg mb-2">🍮 Hashtag B</p>
                                            <p className="text-xs font-bold leading-relaxed text-slate-600">
                                                📍 <strong>地點：</strong> 尖沙咀 / 銅鑼灣分店<br/>
                                                ⏰ <strong>備註：</strong> 雲朵外型極吸睛。適合 4/21 自由行順便購買。<br/>
                                                ⭐ <strong>優點：</strong> 視覺效果最強，最紅打卡款。
                                            </p>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="diary-card p-5 bg-[#FFFDF0] border-dashed">
                                    <h4 className="font-black text-md mb-3">📍 自由行路線建議</h4>
                                    <div className="space-y-3">
                                        <div className="bg-white p-3 rounded-xl border-2 border-slate-100">
                                            <p className="text-xs font-black">路線 A｜尖沙咀文化散步</p>
                                            <p className="text-[11px] font-medium text-slate-500">星光大道拍照 → 歷史博物館 → 維港夜景</p>
                                        </div>
                                        <div className="bg-white p-3 rounded-xl border-2 border-slate-100">
                                            <p className="text-xs font-black">路線 B｜深水埗在地美食</p>
                                            <p className="text-[11px] font-medium text-slate-500">鴨寮街挖寶 → 公和荳品廠豆腐花 → 豬手麵</p>
                                        </div>
                                        <div className="bg-white p-3 rounded-xl border-2 border-slate-100">
                                            <p className="text-xs font-black">路線 C｜旺角掃街版</p>
                                            <p className="text-[11px] font-medium text-slate-500">波鞋街買鞋 → 女人街 → 雞蛋仔咖哩魚蛋</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'teacher' && (
                            <div className="animate-pop space-y-6 pb-10">
                                <div className="diary-card p-5 bg-[#FFFDF0]">
                                    <h2 className="text-xl font-black text-[#E07A5F] flex items-center gap-2 mb-2"><SafeIcon name="Briefcase" /> 老師懶人包</h2>
                                    <p className="text-xs font-bold text-slate-500">📌 每天早餐一定同行，其他時段依各天情況不同。</p>
                                </div>
                                {teacherGuide.map((day, idx) => (
                                    <div key={idx} className="diary-card overflow-hidden animate-pop" style={{animationDelay: `${idx*0.1}s`}}>
                                        <div className="bg-slate-800 p-4 text-white">
                                            <p className="text-[10px] font-bold text-yellow-300 tracking-widest">{day.day}</p>
                                            <h3 className="font-black text-lg">{day.title}</h3>
                                        </div>
                                        <div className="p-4 space-y-3">
                                            {day.items.map((item, iIdx) => (
                                                <div key={iIdx} className="flex items-center justify-between pb-2 border-b border-slate-50 last:border-0">
                                                    <div className="flex gap-4">
                                                        <span className="text-[11px] font-bold text-slate-400 font-mono w-10">{item.time}</span>
                                                        <span className="text-xs font-bold text-slate-700">{item.label}</span>
                                                    </div>
                                                    {item.must && <span className="teacher-must-tag">必</span>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'tools' && (
                            <div className="animate-pop space-y-6">
                                <div className="diary-card p-8 bg-yellow-50">
                                    <h3 className="font-black text-lg mb-6 flex items-center gap-2"><SafeIcon name="RefreshCw" className="text-amber-500" /> 算帳小幫手 (1:4.15)</h3>
                                    <div className="space-y-5">
                                        <div className="relative">
                                            <input type="number" value={hkd} onChange={(e)=>{setHkd(e.target.value); setTwd(e.target.value? (e.target.value*4.15).toFixed(0) : '')}} placeholder="輸入港幣 HKD" className="w-full p-4 rounded-2xl border-2 border-[var(--diary-navy)] font-bold text-lg outline-none shadow-inner" />
                                            <span className="absolute right-4 top-4 font-black opacity-30">HKD</span>
                                        </div>
                                        <div className="flex justify-center"><SafeIcon name="ChevronDown" className="text-yellow-500 animate-bounce" /></div>
                                        <div className="p-6 bg-white rounded-2xl border-2 border-[var(--diary-navy)] text-center shadow-inner relative overflow-hidden">
                                            <p className="text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest">換算台幣約</p>
                                            <p className="text-4xl font-black text-orange-500 font-mono">NT$ {twd || 0}</p>
                                            <div className="absolute top-0 left-0 w-1 h-full bg-orange-400"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Bottom Nav */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto z-50 px-4 pb-6">
                        <div className="bg-white border-[3px] border-[var(--diary-navy)] p-2 flex justify-between items-center rounded-[3rem] shadow-[0_10px_25px_rgba(0,0,0,0.15)]">
                            <button onClick={() => setActiveTab('itinerary')} className={`flex-1 flex flex-col items-center gap-1 py-2 rounded-full transition-all ${activeTab === 'itinerary' ? 'bg-rose-100 scale-105' : ''}`}>
                                <SafeIcon name="Home" className={activeTab === 'itinerary' ? 'text-rose-500' : 'text-slate-300'} />
                                <span className="text-[9px] font-black uppercase">行程</span>
                            </button>
                            <button onClick={() => setActiveTab('tools')} className={`flex-1 flex flex-col items-center gap-1 py-2 rounded-full transition-all ${activeTab === 'tools' ? 'bg-yellow-100 scale-105' : ''}`}>
                                <SafeIcon name="RefreshCw" className={activeTab === 'tools' ? 'text-amber-500' : 'text-slate-300'} />
                                <span className="text-[9px] font-black uppercase">工具</span>
                            </button>
                            <button onClick={() => setActiveTab('teacher')} className={`flex-1 flex flex-col items-center gap-1 py-2 rounded-full transition-all ${activeTab === 'teacher' ? 'bg-indigo-100 scale-105' : ''}`}>
                                <SafeIcon name="Briefcase" className={activeTab === 'teacher' ? 'text-indigo-500' : 'text-slate-300'} />
                                <span className="text-[9px] font-black uppercase">老師</span>
                            </button>
                            <button onClick={() => setActiveTab('pudding')} className={`flex-1 flex flex-col items-center gap-1 py-2 rounded-full transition-all ${activeTab === 'pudding' ? 'bg-pink-100 scale-105' : ''}`}>
                                <SafeIcon name="Coffee" className={activeTab === 'pudding' ? 'text-pink-500' : 'text-slate-300'} />
                                <span className="text-[9px] font-black uppercase">美食</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
